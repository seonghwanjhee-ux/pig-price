name: Daily Pig Price Collection

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = KST 10:00 (데이터 업로드 여유 후)
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      target_date:
        description: '수집 날짜 (비워두면 KST 어제, 예: 20260609)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (코드)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests beautifulsoup4 matplotlib

      - name: Checkout existing CSV from data branch
        run: |
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout origin/data -- pig_price_all.csv || true
            echo "기존 CSV 불러오기 완료"
            ls -la pig_price_all.csv 2>/dev/null && wc -l pig_price_all.csv || echo "파일 없음"
          else
            echo "data 브랜치 없음 (최초 실행)"
          fi

      - name: Collect yesterday's data (KST 기준)
        run: |
          # 수동 실행 시 날짜 지정, 없으면 KST 기준 어제
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET="${{ github.event.inputs.target_date }}"
            echo "=== 날짜 지정 모드: $TARGET ==="
          else
            TARGET=$(python3 -c "
          from datetime import datetime, timezone, timedelta
          kst = timezone(timedelta(hours=9))
          yesterday = (datetime.now(kst) - timedelta(days=1)).date()
          print(yesterday.strftime('%Y%m%d'))
          ")
            echo "=== KST 어제 자동 계산: $TARGET ==="
          fi

          python pig_dashboard.py --date "$TARGET"

      - name: Push CSV to data branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git fetch origin data || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout origin/data -b data_push 2>/dev/null || git checkout data_push
          else
            git checkout --orphan data_push
            git rm -rf . --quiet || true
          fi

          cp /home/runner/work/pig-price/pig-price/pig_price_all.csv ./pig_price_all.csv 2>/dev/null || true
          git add pig_price_all.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          COMMIT_DATE=$(date -u +%Y-%m-%d)
          git commit -m "data: ${COMMIT_DATE} pig price update"
          git push origin data_push:data
          echo "Push complete"
