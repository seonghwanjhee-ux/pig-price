name: Daily Pig Price Collection

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 UTC 00:00 = KST 09:00
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (init 입력 시 90일 초기수집 / 비워두면 오늘 1일치)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (코드)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout data 브랜치 CSV
        run: |
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout origin/data -- pig_price_history.csv || true
            echo "기존 CSV 불러오기 완료"
          else
            echo "data 브랜치 없음 → 새로 생성 예정"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests beautifulsoup4 matplotlib

      - name: Collect pig price data
        run: |
          if [ "${{ github.event.inputs.mode }}" = "init" ]; then
            echo "=== 초기 수집 모드: 90일치 수집 ==="
            python pig_dashboard.py --init
          else
            echo "=== 일반 모드: 오늘 1일치 수집 ==="
            python pig_dashboard.py
          fi

      - name: Push CSV to data 브랜치
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git fetch origin data || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout origin/data -b data
          else
            git checkout --orphan data
            git rm -rf . --quiet || true
          fi

          cp /home/runner/work/*/*/pig_price_history.csv ./pig_price_history.csv 2>/dev/null || true

          git add pig_price_history.csv
          git diff --cached --quiet && echo "변경 없음 → push 생략" && exit 0

          git commit -m "data: $(date +'%Y-%m-%d') 경락가격 업데이트"
          git push origin data
