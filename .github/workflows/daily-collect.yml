name: Daily Pig Price Collection

on:
  schedule:
    # 매일 오전 9시 (한국 시간) = 자정 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests beautifulsoup4 matplotlib

      - name: Collect pig price data
        run: python pig_dashboard.py

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Push to GitHub
        run: |
          git add pig_price_history.csv
          git commit -m "Auto update pig price data: $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push
