name: Daily Pig Price Collection

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests beautifulsoup4 matplotlib

      - name: Collect pig price data
        run: python pig_dashboard.py

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Push to GitHub
        run: |
          git add pig_price_history.csv
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push
